kind = "web"
previewPath = "/"
title = "ClimateTwin India"
version = "1.0.0"
id = "artifacts/climate-twin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21907

[services.development]
run = "pnpm --filter @workspace/climate-twin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/climate-twin", "run", "build" ]
publicDir = "artifacts/climate-twin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21907"
BASE_PATH = "/"
